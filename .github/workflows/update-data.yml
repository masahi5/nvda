name: update-data

on:
  workflow_dispatch: {}
  schedule:
    # 時刻はすべて UTC。米国市場(おおむね 13:30–21:00 UTC)中は15分間隔で更新。
    - cron: "*/15 13-21 * * 1-5"
    # 場後・週末用に1日2回（ニュース/指標/空売り更新の取りこぼし防止）
    - cron: "30 22 * * *"
    - cron: "30 10 * * *"

# data/*.json をリポジトリに push し直すため write 権限が必要
permissions:
  contents: write

# 同時実行を1つに（古い実行はキャンセル）
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Fetch data
        working-directory: pipeline
        env:
          # X投稿の取得元を上書きしたい場合に設定（未設定なら既定のNitterタイムラインを使用）。
          # Repository secrets に登録すると本番の取得に反映される。
          X_RSS_URLS: ${{ secrets.X_RSS_URLS }}
          X_NITTER_BASES: ${{ secrets.X_NITTER_BASES }}
          X_ACCOUNTS: ${{ secrets.X_ACCOUNTS }}
        run: |
          uv sync
          uv run python main.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "データに変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update market data [skip ci]"
            git push
          fi
